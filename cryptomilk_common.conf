# --- Separator ---
SEPARATOR_SOLID_L="î‚²"
SEPARATOR_SOLID_R="î‚°"
SEPARATOR_THIN_L="î‚³"
SEPARATOR_THIN_R="î‚±"

# --- Colors ---
# Presets
COLOR_PRIMARY="colour31"
COLOR_SECONDARY="colour81"
COLOR_LIGHTER="colour231"
COLOR_LIGHT="colour244"
COLOR_DARK="colour237"
COLOR_DARKER="colour236"
COLOR_ACCENT="colour208"
# Window (Active)
COLOR_WIN_ACTIVE_NUM=$COLOR_SECONDARY
COLOR_WIN_ACTIVE_SEP=$COLOR_SECONDARY
COLOR_WIN_ACTIVE_NAME=$COLOR_LIGHTER
COLOR_WIN_ACTIVE_BG=$COLOR_PRIMARY
# Window (Normal)
COLOR_WIN_NORMAL_NUM=$COLOR_SECONDARY
COLOR_WIN_NORMAL_SEP=$COLOR_SECONDARY
COLOR_WIN_NORMAL_NAME=$COLOR_LIGHT
COLOR_WIN_NORMAL_BG=$COLOR_PRIMARY
# Session
COLOR_SESSION_NUM=$COLOR_ACCENT
COLOR_SESSION_ACTIVE_SEP=$COLOR_SECONDARY
COLOR_SESSION_NAME=$COLOR_ACCENT
COLOR_SESSION_BG=$COLOR_ACCENT
# Status
COLOR_STATUS_FG=$COLOR_LIGHTER
COLOR_STATUS_BG=$COLOR_DARKER
# Pane Border
COLOR_PANE_BORDER_ACTIVE_FG=$COLOR_LIGHTER
COLOR_PANE_BORDER_NORMAL_FG=$COLOR_DARKER
# Prefix Highlight
COLOR_PREFIX_HIGHLIGHT_FG=$COLOR_LIGHTER
COLOR_PREFIX_HIGHLIGHT_BG=$COLOR_PRIMARY
# Message
COLOR_MESSAGE_FG=$COLOR_LIGHTER
COLOR_MESSAGE_BG=$COLOR_DARKER
COLOR_MESSAGE_COMMAND_FG=$COLOR_PRIMARY
COLOR_MESSAGE_COMMAND_BG=$COLOR_DARKER
# Clock Mode
COLOR_CLOCK_MODE=$COLOR_PRIMARY

# Plugin supports
# tmux-prefix-highlight
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_fg $COLOR_PREFIX_HIGHLIGHT_FG
set -g @prefix_highlight_bg $COLOR_PREFIX_HIGHLIGHT_BG

# General
set -g status-interval 5
set -g status on
set -g status-right-length 50
set -g status-left-length 20 # rio

# Window status alignment
set -g status-justify left

# Colors
set -g status-bg $COLOR_STATUS_BG
set -g status-fg $COLOR_STATUS_FG
set -g status-attr none

# Pane border
set -g pane-border-fg $COLOR_PANE_BORDER_NORMAL_FG
set -g pane-active-border-fg $COLORO_PANE_BORDER_ACTIVE_FG
set -g display-panes-colour $COLORO_DISPLAY_PANE_NORMAL_FG
set -g display-panes-active-colour $COLORO_DISPLAY_PANE_ACTIVE_FG
set -gqw window-status-activity-attr none

# Clock mode
setw -g clock-mode-colour $COLOR_CLOCK_MODE

# Messages
set -g message-fg $COLOR_MESSAGE_FG
set -g message-bg $COLOR_MESSAGE_BG
set -g message-command-fg $COLOR_MESSAGE_COMMAND_FG
set -g message-command-bg $COLOR_MESSAGE_COMMAND_BG
