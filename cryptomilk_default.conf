# Color definitions
# filled left triangle
f_l_t_primary_darker="#[fg=$COLOR_SECONDARY,bg=$COLOR_DARKER,nobold,noitalics,nounderscore]"
f_l_t_dark_darker="#[fg=$COLOR_DARK,bg=$COLOR_DARKER,nobold,noitalics,nounderscore]"
f_l_t_darker_primary="#[fg=$COLOR_DARKER,bg=$COLOR_SECONDARY,nobold,noitalics,nounderscore]"
f_l_t_darker_dark="#[fg=$COLOR_DARKER,bg=$COLOR_DARK,nobold,noitalics,nounderscore]"
f_l_t_darker_lighter="#[fg=$COLOR_DARKER,bg=$COLOR_LIGHT,nobold,noitalics,nounderscore]"
f_l_t_lighter_darker="#[fg=$COLOR_LIGHTER,bg=$COLOR_DARKER,nobold,noitalics,nounderscore]"
# filled right triangle
f_r_t_primary_dark="#[fg=$COLOR_SECONDARY,bg=$COLOR_DARK,nobold,noitalics,nounderscore]"
f_r_t_primary_darker="#[fg=$COLOR_SECONDARY,bg=$COLOR_DARKER,nobold,noitalics,nounderscore]"
f_r_t_dark_darker="#[fg=$COLOR_DARK,bg=$COLOR_DARKER,nobold,noitalics,nounderscore]"
f_r_t_lighter_darker="#[fg=$COLOR_LIGHTER,bg=$COLOR_DARKER,nobold,noitalics,nounderscore]"
# non-filled triangle
r_t_lighter_dark="#[fg=$COLOR_LIGHT,bg=$COLOR_DARK,nobold,noitalics,nounderscore]"
l_t_lighter_dark="#[fg=$COLOR_LIGHT,bg=$COLOR_DARK,nobold,noitalics,nounderscore]"
l_t_light_lighter="#[fg=$COLOR_LIGHTER,bg=$COLOR_LIGHT,nobold,noitalics,nounderscore]"
l_t_light_primary="#[fg=$COLOR_LIGHTER,bg=$COLOR_SECONDARY,nobold,noitalics,nounderscore]"

# args:
#    direction: "L"|"R"
#    type     : "solid"|"thin"
#    fg       : e.g. colour31 or #eeeeee
#    bg       : e.g. colour31 or #555555
#    deco     : e.g. "nobold,noitalics,nounderscore"
get_separator() {
    direction=$1
    type=$2
    fg=$3
    bg=$4
    deco=$5
    if [ direction = "" ]; then
        direction="L"
    fi
    if [ type = "" ]; then
        type="thin"
    fi
    if [ fg = "" ]; then
        fg=$COLOR_LIGHT
    fi
    if [ bg = "" ]; then
        bg=$COLOR_DARK
    fi
    if [ deco = "" ]; then
        deco="nobold,noitalics,nounderscore"
    fi
}

# window active
f_l_t_window_active="#[fg=$COLOR_SECONDARY,bg=$COLOR_DARKER,nobold,noitalics,nounderscore]"
f_r_t_window_active="#[fg=$COLOR_SECONDARY,bg=$COLOR_DARKER,nobold,noitalics,nounderscore]"

# Plugin supports
prefix_highlight_fg="#{@prefix_highlight_fg}"
prefix_highlight_bg="#{@prefix_highlight_bg}"
set -g @prefix_highlight_output_prefix "#[fg=$prefix_highlight_bg]#[bg=$COLOR_DARKER]#[nobold]#[noitalics]#[nounderscore]#[fg=$prefix_highlight_fg]#[bg=$prefix_highlight_bg] "
set -g @prefix_highlight_output_suffix " #[fg=$COLOR_DARKER]#[bg=$prefix_highlight_bg]"
set -g @prefix_highlight_copy_mode_attr "fg=$prefix_highlight_fg,bg=$prefix_highlight_bg,bold"

# Status bar
session_number="#[fg=$COLOR_ACCENT,bg=$COLOR_LIGHTER,bold] #S $f_l_t_lighter_darker"

day="$r_t_lighter_dark#[fg=$COLOR_LIGHTER,bg=$COLOR_DARK] %Y-%m-%d"
time="$f_r_t_dark_darker#[fg=$COLOR_LIGHTER,bg=$COLOR_DARK] %H:%M"
loadavg="$r_t_lighter_dark#[fg=$COLOR_LIGHTER,bg=$COLOR_DARK] ≣ #(cut -d' ' -f1,2,3 < /proc/loadavg)"
# --- Custom battery status indicator
# battery="$r_t_lighter_dark#[fg=$COLOR_LIGHTER,bg=$COLOR_DARK] #(pmset -g batt | grep -Eo '[0-9]?[0-9]?[0-9]%%')" # Display battery % manualy.
battery="$r_t_lighter_dark#[fg=$COLOR_LIGHTER,bg=$COLOR_DARK] #{battery_icon} #{battery_status_fg}#{battery_percentage}"       # 'tmux-battery' doesn't work.
battery="$r_t_lighter_dark#[fg=$COLOR_LIGHTER,bg=$COLOR_DARK] #{battery_color_charge_fg}#{battery_icon} #{battery_percentage}" # 'tmux-battery' doesn't work.
#{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain}

set -g status-left "$session_number"
set -g status-right "#{prefix_highlight} $time $day $battery $hostname"

# Windows status
window_status_number="$f_l_t_darker_dark #[fg=$COLOR_LIGHT,bg=$COLOR_DARK,nobold]#I"
window_status_name="#[fg=$COLOR_LIGHTER,bg=$COLOR_DARK]#W $f_l_t_dark_darker"
window_status_number_active="$f_l_t_darker_primary #[fg=$COLOR_PRIMARY,bg=$COLOR_SECONDARY,bold]#I"

window_status_name_active="#[fg=$COLOR_LIGHTER,bg=$COLOR_SECONDARY,bold]#[bold]#W $f_l_t_primary_darker"
set -g window-status-format "$window_status_number $window_status_name"
set -g window-status-current-format "$window_status_number_active $window_status_name_active"
set -g window-status-separator ""

# unset variables
setenv -gru f_l_t_primary_darker
setenv -gru f_l_t_dark_darker
setenv -gru f_l_t_darker_dark
setenv -gru f_l_t_darker_lighter
setenv -gru f_l_t_lighter_darker

setenv -gru f_r_t_primary_dark
setenv -gru f_r_t_primary_darker
setenv -gru f_r_t_dark_darker

setenv -gru r_t_lighter_dark
setenv -gru l_t_lighter_dark
setenv -gru l_t_light_lighter

setenv -gru prefix_highlight_fg
setenv -gru prefix_highlight_bg

setenv -gru hostname
setenv -gru session_number
setenv -gru day
setenv -gru time

setenv -gru window_status_number
setenv -gru window_status_name
setenv -gru window_status_number_active
setenv -gru window_status_name_active
